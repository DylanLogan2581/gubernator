name: Bug
description: Track a defect, regression, or broken workflow.
title: "[fix] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this for work that will most likely ship with a `fix(<scope>): ...` commit.
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: The feature area or module name you expect to use in the semantic commit scope.
      options:
        - auth
        - worlds
        - turns
        - calendar
        - permissions
        - nations
        - settlements
        - citizens
        - resources
        - jobs
        - buildings
        - deposits
        - managed-populations
        - trade
        - events
        - notifications
        - reports
        - templates
        - app
        - ci
        - config
        - deps
        - docs
        - home
        - repo
        - supabase
        - testing
        - tooling
    validations:
      required: true
  - type: textarea
    id: bug
    attributes:
      label: Current Behavior
      description: What is happening now?
      placeholder: Advancing a turn leaves citizen counts in an inconsistent state.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: Citizen counts should update correctly after each turn advance.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Include a short sequence that reliably reproduces the issue.
      placeholder: |
        1. Sign in and open a world
        2. Advance the turn
        3. Observe the incorrect citizen count
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: What needs to be true for the bug to be considered fixed?
      placeholder: |
        - The route no longer crashes
        - An expected fallback or error state is shown
        - A regression test is added when practical
    validations:
      required: true
